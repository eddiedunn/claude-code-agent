tasks:
  # Phase 1: Data Models
  - id: "fusion-models"
    task: |
      Add fusion-related data models to grind/models.py:

      1. FusionConfig dataclass:
         - prompt: str (task prompt for all agents)
         - verify: str (verification command)
         - agent_count: int = 3
         - strategy: Literal["best-pick", "hybrid", "manual"] = "best-pick"
         - model: Literal["haiku", "sonnet", "opus"] = "sonnet"
         - fusion_model: Literal["haiku", "sonnet", "opus"] = "opus"
         - max_iterations: int = 10
         - timeout_seconds: int = 600
         - Add validate() method similar to TaskDefinition

      2. AgentOutput dataclass:
         - agent_id: str
         - worktree_branch: str
         - result: GrindResult
         - diff: str (git diff output)
         - files_changed: list[str]
         - summary: str (agent's completion message)

      3. FusionDecision dataclass:
         - strategy_used: str
         - selected_agents: list[str]
         - reasoning: str
         - confidence: float
         - hybrid_instructions: dict[str, list[str]] | None

      4. FusionResult dataclass:
         - config: FusionConfig
         - session_id: str
         - agent_outputs: dict[str, AgentOutput]
         - decision: FusionDecision | None
         - final_patch: str | None
         - status: Literal["success", "no_viable", "fusion_failed", "cancelled"]
         - duration_seconds: float

      Follow existing patterns in models.py. Use field(default_factory=...) for mutable defaults.
    verify: "cd $PROJECT_ROOT && python -c 'from grind.models import FusionConfig, AgentOutput, FusionDecision, FusionResult; print(\"Models imported successfully\")'"
    model: sonnet
    max_iterations: 8

  # Phase 2: Fusion Prompts
  - id: "fusion-prompts"
    task: |
      Create grind/fusion_prompts.py with prompts for the fusion judge agent.

      1. FUSION_SYSTEM_PROMPT - Sets up the judge role:
         - You are a code review judge comparing N implementations
         - Your task is to select the best implementation or synthesize a hybrid
         - You must output structured JSON

      2. FUSION_USER_PROMPT_TEMPLATE - Template that will be formatted with:
         - {original_prompt} - The task all agents worked on
         - {verify_command} - The verification command
         - {agent_outputs} - Formatted section for each agent showing:
           - Agent ID and status
           - Files changed
           - Full diff
           - Agent's completion message
         - {strategy} - best-pick, hybrid, or manual
         - {output_schema} - JSON schema for expected output

      3. build_fusion_prompt(config, agent_outputs) -> str function:
         - Takes FusionConfig and dict of AgentOutput
         - Formats the template with all agent results
         - Returns complete prompt for fusion agent

      4. FUSION_OUTPUT_SCHEMA - JSON schema dict for validation:
         {
           "decision": "best-pick" | "hybrid" | "none-viable",
           "selected_agents": ["agent-1"],
           "reasoning": "...",
           "confidence": 0.85,
           "hybrid_instructions": null | {"from_agent_1": ["file1.py"]}
         }

      5. parse_fusion_response(response: str) -> FusionDecision function:
         - Extract JSON from response text
         - Validate against schema
         - Return FusionDecision dataclass
         - Raise ValueError if parsing fails

      Look at grind/prompts.py for style reference.
    verify: "cd $PROJECT_ROOT && python -c 'from grind.fusion_prompts import FUSION_SYSTEM_PROMPT, build_fusion_prompt, parse_fusion_response; print(\"Fusion prompts imported successfully\")'"
    model: sonnet
    max_iterations: 8
    depends_on: ["fusion-models"]

  # Phase 3: FusionExecutor Core
  - id: "fusion-executor"
    task: |
      Create grind/fusion.py with the FusionExecutor class.

      Class structure:
      ```
      class FusionExecutor:
          def __init__(self, config: FusionConfig):
              self.config = config
              self.session_id = generate_session_id()  # e.g., "fuse_abc123"
              self.worktree_manager = WorktreeManager()
              self.agent_outputs: dict[str, AgentOutput] = {}

          async def execute(self, verbose: bool = False) -> FusionResult
          async def _setup_worktrees(self) -> dict[str, Path]
          async def _run_agents(self, worktree_paths: dict[str, Path], verbose: bool) -> None
          async def _collect_results(self, worktree_paths: dict[str, Path]) -> None
          async def _run_fusion(self, verbose: bool) -> FusionDecision | None
          async def _cleanup_worktrees(self) -> None
      ```

      Implementation details:

      1. execute() orchestrates the full flow:
         - Setup worktrees
         - Run agents in parallel
         - Collect results (diffs, file lists)
         - Run fusion agent if any succeeded
         - Return FusionResult

      2. _setup_worktrees():
         - Create N worktrees using WorktreeManager
         - Branch naming: f"fuse/{self.session_id}/agent-{n}"
         - Return dict mapping agent_id -> worktree_path

      3. _run_agents():
         - Create TaskDefinition for each agent (same prompt, different cwd)
         - Use asyncio.gather() to run all via grind()
         - Use semaphore to limit concurrency if needed
         - Store GrindResult in self.agent_outputs

      4. _collect_results():
         - For each agent, run git diff to get changes
         - Run git diff --stat for files_changed list
         - Update AgentOutput with diff and files_changed

      5. _run_fusion():
         - Skip if no agents succeeded
         - Build fusion prompt via build_fusion_prompt()
         - Run single grind() call with fusion prompt
         - Parse response via parse_fusion_response()
         - Return FusionDecision

      6. _cleanup_worktrees():
         - Remove all worktrees for this session
         - Use worktree_manager.cleanup()

      Helper function:
      - generate_session_id() -> str: Returns "fuse_" + 8 random hex chars

      Reuse existing imports from grind.engine, grind.worktree, grind.models.
    verify: "cd $PROJECT_ROOT && python -c 'from grind.fusion import FusionExecutor; print(\"FusionExecutor imported successfully\")'"
    model: opus
    max_iterations: 12
    depends_on: ["fusion-prompts"]

  # Phase 4: CLI Commands
  - id: "fusion-cli"
    task: |
      Add fusion CLI commands to grind/cli.py.

      Add a new 'fuse' command group with subcommands:

      1. grind fuse run <prompt> [options]
         --agents=N          Number of parallel agents (default: 3)
         --strategy=S        best-pick|hybrid|manual (default: best-pick)
         --model=M           Agent model (default: sonnet)
         --fusion-model=M    Judge model (default: opus)
         --verify=CMD        Verification command (required)
         --max-iterations=N  Per-agent iteration limit (default: 10)
         --verbose           Show detailed output

         Implementation:
         - Parse options into FusionConfig
         - Create FusionExecutor
         - Run execute()
         - Print summary with decision and reasoning
         - Return exit code based on result.status

      2. grind fuse status [session_id]
         - If session_id provided: show that session's status
         - If no session_id: list all sessions in .grind/fuse/
         - Show: session_id, status, agent count, created time

      3. grind fuse logs <session_id> [agent_id]
         - If agent_id provided: cat that agent's output.log
         - If no agent_id: show summary of all agents

      4. grind fuse cleanup [session_id]
         - If session_id: cleanup that session's worktrees
         - If no session_id: cleanup all fusion worktrees
         - Use WorktreeManager

      Look at existing CLI patterns in cli.py (batch, dag commands).
      Use click decorators consistently with existing code.
    verify: "cd $PROJECT_ROOT && uv run grind fuse --help"
    model: sonnet
    max_iterations: 10
    depends_on: ["fusion-executor"]

  # Phase 5: State Persistence
  - id: "fusion-persistence"
    task: |
      Add state persistence for fusion sessions to grind/fusion.py.

      Session directory structure:
      .grind/fuse/{session_id}/
        manifest.yaml        # FusionConfig + status + timestamps
        agent-1/
          output.log         # Captured from grind execution
          result.json        # Serialized GrindResult
          diff.patch         # Git diff output
        agent-2/
          ...
        fusion/
          prompt.md          # Prompt sent to judge
          response.json      # Raw response from judge
          decision.json      # Parsed FusionDecision
          final.patch        # Combined patch (if hybrid)

      Add methods to FusionExecutor:

      1. _save_manifest() -> None
         - Write config, session_id, status, timestamps to manifest.yaml
         - Call after setup and after each major phase

      2. _save_agent_output(agent_id: str, output: AgentOutput) -> None
         - Create agent directory
         - Write result.json (serialize GrindResult)
         - Write diff.patch

      3. _save_fusion_output(prompt: str, response: str, decision: FusionDecision) -> None
         - Create fusion directory
         - Write prompt.md, response.json, decision.json

      4. @classmethod load_session(cls, session_id: str) -> FusionExecutor
         - Load manifest.yaml
         - Reconstruct FusionExecutor state
         - Used for status/logs commands

      5. list_sessions() -> list[dict] (module-level function)
         - Scan .grind/fuse/ directory
         - Return list of {session_id, status, created, agent_count}

      Use yaml for manifest, json for structured data.
      Create .grind/fuse/ directory if it doesn't exist.
    verify: "cd $PROJECT_ROOT && python -c 'from grind.fusion import FusionExecutor; e = FusionExecutor.__new__(FusionExecutor); print(\"Persistence methods exist:\", hasattr(e, \"_save_manifest\") or True)'"
    model: sonnet
    max_iterations: 10
    depends_on: ["fusion-cli"]

  # Phase 6: Tests
  - id: "fusion-tests"
    task: |
      Create tests/test_fusion.py with comprehensive tests.

      Test categories:

      1. Model tests:
         - test_fusion_config_defaults()
         - test_fusion_config_validation()
         - test_agent_output_serialization()
         - test_fusion_decision_fields()

      2. Prompt tests:
         - test_build_fusion_prompt_single_agent()
         - test_build_fusion_prompt_multiple_agents()
         - test_parse_fusion_response_valid()
         - test_parse_fusion_response_invalid_json()
         - test_parse_fusion_response_missing_fields()

      3. Executor tests (use mocking):
         - test_generate_session_id_format()
         - test_setup_worktrees_creates_branches()
         - test_collect_results_extracts_diff()
         - test_execute_all_agents_fail()
         - test_execute_some_agents_succeed()

      4. Integration test (can be marked slow):
         - test_fusion_end_to_end_simple()
           - Use a trivial task like "create a file with content X"
           - Run 2 agents
           - Verify fusion picks one

      Use pytest fixtures for common setup.
      Mock ClaudeSDKClient for unit tests.
      Look at existing test patterns in tests/test_*.py.
    verify: "cd $PROJECT_ROOT && uv run pytest tests/test_fusion.py -v --tb=short"
    model: sonnet
    max_iterations: 12
    depends_on: ["fusion-persistence"]
