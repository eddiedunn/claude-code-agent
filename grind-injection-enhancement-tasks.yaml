          async def test_session_isolation(self):
              """Verify messages don't leak between sessions."""
              manager = MessageQueueManager()

              msg1 = InjectionMessage(
                  action=CheckpointAction.GUIDANCE,
                  message="Session 1",
                  timestamp=datetime.now(timezone.utc),
                  source="test",
                  session_id="sess_1",
              )
