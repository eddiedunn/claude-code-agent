  - id: "implement-graceful-shutdown"
    task: |
      Implement graceful shutdown for the server.

      When the server receives SIGTERM:
      1. Stop accepting new sessions
      2. Log "Server shutting down, waiting for sessions..."
      3. Give running sessions 30 seconds to complete
      4. After timeout, cancel remaining sessions
      5. Persist session state to ~/.grind/sessions/{id}/state.json
      6. Clean exit

      Update SessionManager with:

      ```python
      import json

      async def shutdown(self, timeout: float = 30.0) -> None:
          """Gracefully shutdown, waiting for sessions to complete."""
          logger.info(f"Shutting down, waiting up to {timeout}s for sessions...")

          self._accepting_new = False

          # Wait for running sessions
          running = [s for s in self._sessions.values() if s.status == SessionStatus.RUNNING]
          if running:
              try:
                  await asyncio.wait_for(
                      self._wait_for_sessions(running),
                      timeout=timeout,
                  )
              except asyncio.TimeoutError:
                  logger.warning(f"Timeout waiting for {len(running)} sessions, cancelling...")
                  for session in running:
                      await self.cancel_session(session.id)

          # Save state for all sessions
          for session_id in self._sessions:
              self._save_session_state(session_id)

          logger.info("Shutdown complete")

      def _save_session_state(self, session_id: str) -> None:
          """Persist session state to disk."""
          session = self._sessions.get(session_id)
          if not session:
              return

          state_dir = Path.home() / ".grind" / "sessions" / session_id
          state_dir.mkdir(parents=True, exist_ok=True)
          state_file = state_dir / "state.json"

          state = {
              "id": session.id,
              "task": session.task,
              "status": session.status,
              "current_iteration": session.current_iteration,
              "error": session.error,
              "created_at": session.created_at.isoformat(),
              "completed_at": session.completed_at.isoformat() if session.completed_at else None,
          }
          state_file.write_text(json.dumps(state, indent=2))
      ```
