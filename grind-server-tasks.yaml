  - id: "implement-health-route"
    task: |
      Implement the health check endpoint in grind/server/routes/health.py.

      ```python
      from datetime import datetime, timezone
      from typing import Annotated

      from fastapi import APIRouter, Depends, Request

      from grind.server.models.responses import HealthResponse
      from grind.server.services.session_manager import SessionManager

      router = APIRouter(tags=["health"])

      # Track server start time
      _server_start_time: datetime | None = None

      def set_server_start_time() -> None:
          global _server_start_time
          _server_start_time = datetime.now(timezone.utc)

      def get_session_manager(request: Request) -> SessionManager:
          return request.app.state.session_manager

      @router.get("/health", response_model=HealthResponse)
      async def health_check(
          session_manager: Annotated[SessionManager, Depends(get_session_manager)],
      ) -> HealthResponse:
          """Check server health and status."""
          uptime = 0.0
          if _server_start_time:
              uptime = (datetime.now(timezone.utc) - _server_start_time).total_seconds()

          active = sum(1 for s in await session_manager.list_sessions() if s.status == "running")

          return HealthResponse(
              status="ok",
              version="0.1.0",
              active_sessions=active,
              uptime_seconds=uptime,
          )
      ```

      Use Annotated[..., Depends(...)] syntax (modern FastAPI pattern).
