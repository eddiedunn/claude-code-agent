  - id: "implement-session-manager"
    task: |
      Implement SessionManager in grind/server/services/session_manager.py.

      Update grind/server/services/__init__.py:
      ```python
      """Server services."""
      from grind.server.services.session_manager import SessionManager

      __all__ = ["SessionManager"]
      ```

      This is the core service that bridges FastAPI to the grind engine.

      ```python
      from __future__ import annotations

      import asyncio
      import uuid
      from datetime import datetime, timezone
      from pathlib import Path
      from typing import TYPE_CHECKING

      from grind.server.exceptions import (
          SessionNotFoundError,
          SessionNotRunningError,
          SessionAlreadyExistsError,
      )
      from grind.server.logging import get_logger
      from grind.server.models.requests import CreateSessionRequest
      from grind.server.models.responses import SessionInfo, SessionStatus

      if TYPE_CHECKING:
          from grind.models import TaskDefinition

      logger = get_logger("session_manager")
      ```

      Class SessionManager:
        - __init__(self): Initialize sessions dict, _task_group (optional), _lock
        - async create_session(request: CreateSessionRequest) -> SessionInfo
        - async get_session(session_id: str) -> SessionInfo (raises SessionNotFoundError)
        - async list_sessions(tag: str | None = None) -> list[SessionInfo]
        - async cancel_session(session_id: str) -> bool (raises SessionNotFoundError)
        - get_log_path(session_id: str) -> Path
        - async inject(session_id: str, message: str) -> bool (raises SessionNotFoundError, SessionNotRunningError)
        - async shutdown(timeout: float = 30.0) -> None
        - async recover_sessions() -> int

      Key implementation details:

      1. Generate 8-char session IDs: `uuid.uuid4().hex[:8]`

      2. Idempotency key handling in create_session():
         ```python
         if request.idempotency_key:
             async with self._lock:
                 for session in self._sessions.values():
                     if session.idempotency_key == request.idempotency_key:
                         logger.info(f"Returning existing session for idempotency key: {request.idempotency_key}")
                         return session
         ```

      3. Use asyncio.Queue for thread-safe status updates (avoids race conditions):
         ```python
         def __init__(self, event_bridge: EventBridge | None = None) -> None:
             self._sessions: dict[str, SessionInfo] = {}
             self._running_tasks: dict[str, asyncio.Task] = {}
             self._lock = asyncio.Lock()
             self._status_queue: asyncio.Queue[tuple[str, SessionStatus, str | None]] = asyncio.Queue()
             self._event_bridge = event_bridge
             self._accepting_new = True
             self._status_processor_task: asyncio.Task | None = None

         async def _start_status_processor(self) -> None:
             """Start background task to process status updates."""
             self._status_processor_task = asyncio.create_task(self._process_status_updates())

         async def _process_status_updates(self) -> None:
             """Process status updates from queue (runs in background)."""
             while True:
                 try:
                     session_id, new_status, error = await self._status_queue.get()
                     async with self._lock:
                         if session_id in self._sessions:
                             session = self._sessions[session_id]
                             session.status = new_status
                             if error:
                                 session.error = error
                             if new_status == SessionStatus.RUNNING:
                                 session.started_at = datetime.now(timezone.utc)
                             elif new_status in (SessionStatus.COMPLETED, SessionStatus.FAILED, SessionStatus.CANCELLED):
                                 session.completed_at = datetime.now(timezone.utc)
                     self._status_queue.task_done()
                 except asyncio.CancelledError:
                     break

         async def _update_status(self, session_id: str, status: SessionStatus, error: str | None = None) -> None:
             """Queue a status update (thread-safe)."""
             await self._status_queue.put((session_id, status, error))
         ```

      4. Session runner with proper error handling:
         ```python
         async def _run_session(self, session_id: str, task_def: TaskDefinition) -> None:
             """Run a grind session and update status on completion."""
             try:
                 await self._update_status(session_id, SessionStatus.RUNNING)
                 from grind.engine import grind
                 await grind(task_def)
                 await self._update_status(session_id, SessionStatus.COMPLETED)
             except asyncio.CancelledError:
                 await self._update_status(session_id, SessionStatus.CANCELLED)
                 raise
             except Exception as e:
                 logger.exception(f"Session {session_id} failed")
                 await self._update_status(session_id, SessionStatus.FAILED, error=str(e))
             finally:
                 async with self._lock:
                     self._running_tasks.pop(session_id, None)
         ```

      5. Use asyncio.Lock for dict access (Queue handles status update ordering)

      6. Log path: Path.home() / ".grind" / "sessions" / session_id / "session.log"

      7. All timestamps should use timezone-aware UTC: datetime.now(timezone.utc)

      8. Start status processor in recover_sessions() or have app lifespan call it
