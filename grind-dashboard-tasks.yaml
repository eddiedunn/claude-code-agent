# Grind Dashboard MVP - Task File
# A React + TypeScript frontend for monitoring and controlling grind sessions
#
# Run with: uv run grind spawn -t grind-dashboard-tasks.yaml
# Or sequential: uv run grind batch grind-dashboard-tasks.yaml

tasks:
  # ============================================================================
  # PHASE 1: PROJECT SCAFFOLDING
  # ============================================================================

  - id: scaffold-vite-project
    task: |
      Create a new React + TypeScript project using Vite in the 'dashboard/' directory.

      Steps:
      1. Run: npm create vite@latest dashboard -- --template react-ts
      2. cd dashboard && npm install
      3. Install additional dependencies:
         - npm install zustand (state management)
         - npm install -D tailwindcss postcss autoprefixer
         - npx tailwindcss init -p
      4. Configure tailwind.config.js to scan src/**/*.{ts,tsx}
      5. Replace src/index.css with Tailwind directives (@tailwind base/components/utilities)
      6. Clean up default Vite boilerplate (remove App.css, logo.svg, counter code)
      7. Update App.tsx with a simple "Grind Dashboard" heading to verify setup

      The project structure should be:
      dashboard/
      ├── package.json
      ├── vite.config.ts
      ├── tailwind.config.js
      ├── postcss.config.js
      ├── tsconfig.json
      ├── index.html
      └── src/
          ├── main.tsx
          ├── App.tsx
          └── index.css
    verify: "cd dashboard && npm run build"
    model: sonnet
    max_iterations: 8

  - id: setup-project-structure
    task: |
      Set up the folder structure and create empty placeholder files for the dashboard.

      Create these directories and files inside dashboard/src/:

      src/
      ├── components/
      │   ├── SessionList.tsx (export empty component)
      │   ├── SessionCard.tsx (export empty component)
      │   ├── SessionDetail.tsx (export empty component)
      │   ├── LogViewer.tsx (export empty component)
      │   ├── ControlPanel.tsx (export empty component)
      │   ├── NewSessionModal.tsx (export empty component)
      │   ├── HealthIndicator.tsx (export empty component)
      │   └── StatusBadge.tsx (export empty component)
      ├── hooks/
      │   ├── useWebSocket.ts (export empty hook returning null)
      │   ├── useLogStream.ts (export empty hook returning [])
      │   └── useHealth.ts (export empty hook returning null)
      ├── store/
      │   └── grindStore.ts (export empty zustand store)
      ├── api/
      │   └── client.ts (export empty functions)
      └── types/
          └── index.ts (export type placeholders)

      Each component should be a minimal valid React component that renders a div with its name.
      This ensures the build passes and establishes the architecture.
    verify: "cd dashboard && npm run build"
    model: haiku
    max_iterations: 6
    depends_on: [scaffold-vite-project]

  # ============================================================================
  # PHASE 2: TYPE DEFINITIONS & API CLIENT
  # ============================================================================

  - id: define-types
    task: |
      Create TypeScript type definitions in dashboard/src/types/index.ts that match
      the grind server API models exactly.

      Reference the server models from:
      - grind/server/models/responses.py (SessionInfo, SessionStatus, HealthResponse, SessionListResponse)
      - grind/server/models/requests.py (CreateSessionRequest, InjectRequest)

      Define these types:

      ```typescript
      // Session status enum matching server
      export type SessionStatus = 'pending' | 'running' | 'paused' | 'completed' | 'failed' | 'cancelled';

      // Session info from GET /sessions/{id}
      export interface Session {
        id: string;
        task: string;
        status: SessionStatus;
        model: string;
        current_iteration: number;
        max_iterations: number;
        cwd: string;
        tags: string[];
        created_at: string;  // ISO datetime
        started_at: string | null;
        completed_at: string | null;
        error: string | null;
        idempotency_key: string | null;
      }

      // POST /sessions/ request body
      export interface CreateSessionParams {
        task: string;
        verify?: string;
        cwd?: string;
        model?: 'haiku' | 'sonnet' | 'opus';
        max_iterations?: number;
        tags?: string[];
        idempotency_key?: string;
      }

      // POST /sessions/{id}/inject request body
      export interface InjectParams {
        message: string;
        action?: 'guidance' | 'guidance_persist' | 'abort' | 'status' | 'verify';
        persistent?: boolean;
      }

      // GET /health response
      export interface HealthResponse {
        status: 'ok' | 'degraded' | 'unhealthy';
        version: string;
        active_sessions: number;
        uptime_seconds: number;
        accepting_new_sessions: boolean;
        session_capacity: { current: number; max: number };
        failure_rate: number;
      }

      // WebSocket event from /ws/events
      export interface GrindEvent {
        event_type: string;
        agent_id: string;
        data: Record<string, unknown>;
        timestamp: number;
      }
      ```

      Make sure types match the Python Pydantic models exactly.
    verify: "cd dashboard && npm run build"
    model: haiku
    max_iterations: 5
    depends_on: [setup-project-structure]

  - id: implement-api-client
    task: |
      Implement the API client in dashboard/src/api/client.ts for communicating
      with the grind server REST API.

      The grind server runs at http://localhost:8420 by default.

      Implement these functions using fetch:

      ```typescript
      const API_BASE = 'http://localhost:8420';

      // GET /sessions/ - list all sessions, optional tag filter
      export async function listSessions(tag?: string): Promise<Session[]>

      // GET /sessions/{id} - get single session
      export async function getSession(sessionId: string): Promise<Session>

      // POST /sessions/ - create new session
      export async function createSession(params: CreateSessionParams): Promise<Session>

      // DELETE /sessions/{id} - cancel session
      export async function cancelSession(sessionId: string): Promise<void>

      // POST /sessions/{id}/inject - inject guidance
      export async function injectGuidance(sessionId: string, params: InjectParams): Promise<void>

      // GET /health - health check
      export async function getHealth(): Promise<HealthResponse>
      ```

      Error handling:
      - Throw Error with message for non-2xx responses
      - Include status code in error message
      - Handle 404 (session not found), 429 (rate limited), 400 (bad request)

      Import types from '../types'.
    verify: "cd dashboard && npm run build"
    model: sonnet
    max_iterations: 6
    depends_on: [define-types]

  # ============================================================================
  # PHASE 3: STATE MANAGEMENT
  # ============================================================================

  - id: implement-zustand-store
    task: |
      Implement the Zustand store in dashboard/src/store/grindStore.ts.

      The store manages:
      1. Sessions map (id -> Session)
      2. Selected session ID
      3. Server health
      4. WebSocket connection state

      ```typescript
      import { create } from 'zustand';
      import type { Session, HealthResponse, CreateSessionParams, InjectParams } from '../types';
      import * as api from '../api/client';

      interface GrindStore {
        // State
        sessions: Map<string, Session>;
        selectedSessionId: string | null;
        health: HealthResponse | null;
        wsConnected: boolean;
        loading: boolean;
        error: string | null;

        // Session actions
        fetchSessions: () => Promise<void>;
        selectSession: (id: string | null) => void;
        createSession: (params: CreateSessionParams) => Promise<Session>;
        cancelSession: (id: string) => Promise<void>;
        injectGuidance: (id: string, params: InjectParams) => Promise<void>;

        // State updates (called by WebSocket/polling)
        updateSession: (session: Session) => void;
        setHealth: (health: HealthResponse) => void;
        setWsConnected: (connected: boolean) => void;
        setError: (error: string | null) => void;

        // Computed helpers
        getSelectedSession: () => Session | null;
        getSessionsList: () => Session[];
      }

      export const useGrindStore = create<GrindStore>((set, get) => ({
        // ... implement all state and actions
      }));
      ```

      Implementation notes:
      - Use Map for sessions (better for updates by ID)
      - fetchSessions should update the Map, not replace it
      - updateSession merges into existing session
      - Error handling should set error state
      - Loading state for async operations
    verify: "cd dashboard && npm run build"
    model: sonnet
    max_iterations: 8
    depends_on: [implement-api-client]

  # ============================================================================
  # PHASE 4: CORE COMPONENTS
  # ============================================================================

  - id: implement-status-badge
    task: |
      Implement the StatusBadge component in dashboard/src/components/StatusBadge.tsx.

      A small colored badge that shows session status with appropriate styling.

      Props:
      - status: SessionStatus
      - size?: 'sm' | 'md' (default: 'md')

      Color mapping (use Tailwind classes):
      - pending: gray (bg-gray-100 text-gray-700)
      - running: blue with pulse animation (bg-blue-100 text-blue-700 animate-pulse)
      - paused: yellow (bg-yellow-100 text-yellow-700)
      - completed: green (bg-green-100 text-green-700)
      - failed: red (bg-red-100 text-red-700)
      - cancelled: gray (bg-gray-200 text-gray-500)

      Display:
      - Rounded pill shape (rounded-full px-2 py-0.5)
      - Icon prefix: ● for running, ✓ for completed, ✗ for failed, ○ for others
      - Capitalize first letter of status
      - Size 'sm' uses text-xs, 'md' uses text-sm
    verify: "cd dashboard && npm run build"
    model: haiku
    max_iterations: 5
    depends_on: [define-types]

  - id: implement-health-indicator
    task: |
      Implement the HealthIndicator component in dashboard/src/components/HealthIndicator.tsx.

      Shows server connection status and capacity in the header.

      Props: none (reads from store)

      Display:
      1. Connection dot: green if wsConnected && health.status === 'ok', yellow if degraded, red otherwise
      2. Text: "Connected" or "Disconnected"
      3. Capacity: "3/10 sessions" from health.session_capacity
      4. Tooltip or small text showing uptime

      Layout: horizontal flex, items centered, gap-2
      Use Tailwind classes.

      Use the useGrindStore hook to get health and wsConnected state.
      Also implement polling: use useEffect to call api.getHealth() every 30 seconds
      and update the store with setHealth().
    verify: "cd dashboard && npm run build"
    model: haiku
    max_iterations: 6
    depends_on: [implement-zustand-store]

  - id: implement-session-card
    task: |
      Implement the SessionCard component in dashboard/src/components/SessionCard.tsx.

      A clickable card showing session summary in the list view.

      Props:
      - session: Session
      - selected: boolean
      - onClick: () => void

      Display layout:
      ```
      ┌────────────────────────────────────────────┐
      │ <StatusBadge>  Task description trunca...  │
      │ sonnet  │  3/10 iterations  │  2m ago     │
      └────────────────────────────────────────────┘
      ```

      Features:
      - Truncate task to ~50 chars with ellipsis
      - Show model name (haiku/sonnet/opus)
      - Show iteration progress: current_iteration / max_iterations
      - Show relative time since created_at (use simple "Xm ago", "Xh ago" format)
      - Selected state: ring-2 ring-blue-500 border
      - Hover state: bg-gray-50
      - Cursor pointer

      Use Tailwind. Import StatusBadge component.
    verify: "cd dashboard && npm run build"
    model: sonnet
    max_iterations: 6
    depends_on: [implement-status-badge]

  - id: implement-session-list
    task: |
      Implement the SessionList component in dashboard/src/components/SessionList.tsx.

      The left panel showing all sessions with a "New Session" button.

      Props: none (reads from store)

      Layout:
      ```
      ┌─────────────────────────────┐
      │ Sessions          [+ New]  │
      ├─────────────────────────────┤
      │ <SessionCard />             │
      │ <SessionCard />             │
      │ <SessionCard />             │
      │ ...                         │
      └─────────────────────────────┘
      ```

      Features:
      - Header with "Sessions" title and "+ New" button
      - Scrollable list of SessionCard components
      - Loading state when fetching
      - Empty state: "No sessions yet"
      - Error state if fetch failed
      - Click card to select (call store.selectSession)
      - "+ New" button opens NewSessionModal (for now, just console.log)

      Use useGrindStore to get sessions, selectedSessionId, loading, error.
      Call fetchSessions on mount with useEffect.

      Styling:
      - Fixed width (w-80)
      - Full height (h-full)
      - Border right (border-r)
      - Overflow-y-auto for scrolling
    verify: "cd dashboard && npm run build"
    model: sonnet
    max_iterations: 8
    depends_on: [implement-session-card, implement-zustand-store]

  # ============================================================================
  # PHASE 5: SESSION DETAIL & LOG VIEWER
  # ============================================================================

  - id: implement-log-viewer
    task: |
      Implement the LogViewer component in dashboard/src/components/LogViewer.tsx.

      Streams and displays session logs using Server-Sent Events (SSE).

      Props:
      - sessionId: string
      - autoScroll?: boolean (default: true)

      Features:
      1. Connect to SSE endpoint: GET /sessions/{sessionId}/logs?from_start=true
      2. Append log lines as they arrive
      3. Auto-scroll to bottom when new logs arrive (if autoScroll enabled)
      4. Toggle button to enable/disable auto-scroll
      5. Monospace font (font-mono)
      6. Dark background (bg-gray-900 text-gray-100)
      7. Line numbers (optional, stretch goal)

      SSE implementation:
      ```typescript
      const eventSource = new EventSource(`${API_BASE}/sessions/${sessionId}/logs?from_start=true`);
      eventSource.onmessage = (event) => {
        // Append event.data to logs state
      };
      eventSource.onerror = () => {
        // Handle disconnect, maybe reconnect
      };
      // Cleanup on unmount
      ```

      State:
      - logs: string[] (array of log lines)
      - connected: boolean
      - autoScroll: boolean

      Styling:
      - Full height of container
      - Overflow-y-auto
      - Padding p-4
      - Text size text-sm
    verify: "cd dashboard && npm run build"
    model: sonnet
    max_iterations: 10
    depends_on: [define-types]

  - id: implement-control-panel
    task: |
      Implement the ControlPanel component in dashboard/src/components/ControlPanel.tsx.

      Controls for interacting with a running session.

      Props:
      - session: Session

      Layout:
      ```
      ┌──────────────────────────────────────────────┐
      │ Inject Guidance                              │
      │ ┌──────────────────────────────────────────┐ │
      │ │ [textarea for guidance message]          │ │
      │ └──────────────────────────────────────────┘ │
      │ ☐ Persistent (keeps guidance across iters)  │
      │                    [Send Guidance]  [Abort] │
      └──────────────────────────────────────────────┘
      ```

      Features:
      1. Textarea for guidance message
      2. Checkbox for persistent flag
      3. "Send Guidance" button - calls store.injectGuidance with action="guidance"
      4. "Abort" button (red, with confirmation) - calls store.cancelSession
      5. Disable controls if session is not running
      6. Show loading state while sending
      7. Clear textarea after successful send

      State:
      - message: string
      - persistent: boolean
      - sending: boolean

      Use useGrindStore for actions.
      Confirm before abort: window.confirm("Are you sure you want to abort this session?")
    verify: "cd dashboard && npm run build"
    model: sonnet
    max_iterations: 8
    depends_on: [implement-zustand-store]

  - id: implement-session-detail
    task: |
      Implement the SessionDetail component in dashboard/src/components/SessionDetail.tsx.

      The main panel showing selected session details, logs, and controls.

      Props: none (reads selectedSessionId from store)

      Layout:
      ```
      ┌─────────────────────────────────────────────────────────────┐
      │  ← Back    Task description here...            <StatusBadge>│
      ├─────────────────────────────────────────────────────────────┤
      │  Model: sonnet  │  Iteration: 3/10  │  Elapsed: 2m 34s     │
      ├─────────────────────────────────────────────────────────────┤
      │                                                             │
      │  <LogViewer />                                              │
      │  (takes most of the space)                                  │
      │                                                             │
      ├─────────────────────────────────────────────────────────────┤
      │  <ControlPanel />                                           │
      └─────────────────────────────────────────────────────────────┘
      ```

      Features:
      1. Back button to deselect (store.selectSession(null))
      2. Task description (full, not truncated)
      3. StatusBadge showing current status
      4. Metadata bar: model, iteration progress, elapsed time
      5. LogViewer component for log streaming
      6. ControlPanel at bottom (only show if session is running)
      7. If session has error, show error message in red

      Elapsed time calculation:
      - If running: now - started_at
      - If completed: completed_at - started_at
      - Format as "Xm Xs" or "Xh Xm"

      Empty state: "Select a session to view details"
    verify: "cd dashboard && npm run build"
    model: sonnet
    max_iterations: 10
    depends_on: [implement-log-viewer, implement-control-panel, implement-status-badge]

  # ============================================================================
  # PHASE 6: NEW SESSION MODAL
  # ============================================================================

  - id: implement-new-session-modal
    task: |
      Implement the NewSessionModal component in dashboard/src/components/NewSessionModal.tsx.

      A modal dialog for creating new grind sessions.

      Props:
      - isOpen: boolean
      - onClose: () => void

      Form fields:
      1. Task (textarea, required) - "What should the agent do?"
      2. Verify command (text input, optional) - "Command to verify success"
      3. Model (radio buttons: haiku, sonnet, opus) - default: sonnet
      4. Max iterations (number input, 1-100) - default: 10
      5. Working directory (text input, optional) - placeholder shows current dir
      6. Tags (text input, comma-separated, optional)

      Buttons:
      - "Create Session" (primary, blue)
      - "Cancel" (secondary)

      Behavior:
      1. Validate task is not empty
      2. On submit, call store.createSession(params)
      3. On success, close modal and select the new session
      4. On error, show error message in modal
      5. Disable form while submitting

      Modal styling:
      - Centered overlay with backdrop (bg-black/50)
      - White modal card with rounded corners
      - Max width (max-w-lg)
      - Padding and spacing
      - Close on backdrop click or Cancel button
      - Focus trap (stretch goal)
    verify: "cd dashboard && npm run build"
    model: sonnet
    max_iterations: 10
    depends_on: [implement-zustand-store]

  # ============================================================================
  # PHASE 7: WEBSOCKET INTEGRATION
  # ============================================================================

  - id: implement-websocket-hook
    task: |
      Implement the useWebSocket hook in dashboard/src/hooks/useWebSocket.ts.

      Manages WebSocket connection to /ws/events for real-time updates.

      ```typescript
      export function useWebSocket(sessionId?: string): {
        connected: boolean;
        lastEvent: GrindEvent | null;
      }
      ```

      Features:
      1. Connect to ws://localhost:8420/ws/events on mount
      2. Optional sessionId filter: ?session_id=xxx
      3. Handle connection lifecycle (open, close, error)
      4. Parse incoming messages as GrindEvent
      5. Update store on relevant events:
         - iteration_completed: update session.current_iteration
         - agent_completed: refetch session
         - session_completed: update session.status
      6. Auto-reconnect on disconnect (with exponential backoff, max 5 attempts)
      7. Send ping every 30s to keep connection alive
      8. Update store.wsConnected state

      Implementation:
      ```typescript
      useEffect(() => {
        const url = sessionId
          ? `ws://localhost:8420/ws/events?session_id=${sessionId}`
          : 'ws://localhost:8420/ws/events';

        const ws = new WebSocket(url);

        ws.onopen = () => store.setWsConnected(true);
        ws.onclose = () => {
          store.setWsConnected(false);
          // reconnect logic
        };
        ws.onmessage = (event) => {
          const data = JSON.parse(event.data) as GrindEvent;
          handleEvent(data);
        };

        return () => ws.close();
      }, [sessionId]);
      ```

      Use the store to update session state when events arrive.
    verify: "cd dashboard && npm run build"
    model: sonnet
    max_iterations: 10
    depends_on: [implement-zustand-store, define-types]

  # ============================================================================
  # PHASE 8: APP SHELL & INTEGRATION
  # ============================================================================

  - id: implement-app-shell
    task: |
      Update dashboard/src/App.tsx to be the main app shell that integrates all components.

      Layout:
      ```
      ┌─────────────────────────────────────────────────────────────────┐
      │  GRIND DASHBOARD                          <HealthIndicator />  │
      ├────────────────────┬────────────────────────────────────────────┤
      │                    │                                            │
      │  <SessionList />   │  <SessionDetail />                        │
      │  (fixed width)     │  (flex grow)                              │
      │                    │                                            │
      │                    │                                            │
      │                    │                                            │
      └────────────────────┴────────────────────────────────────────────┘
      ```

      Features:
      1. Header with "GRIND DASHBOARD" title and HealthIndicator
      2. Two-column layout: SessionList (left), SessionDetail (right)
      3. NewSessionModal (controlled by local state)
      4. Pass onNewSession callback to SessionList to open modal
      5. Initialize WebSocket connection using useWebSocket hook
      6. Full viewport height (h-screen)

      Styling:
      - Header: h-14, border-b, flex items-center justify-between, px-4
      - Main: flex, h-[calc(100vh-3.5rem)]
      - SessionList: w-80, flex-shrink-0
      - SessionDetail: flex-1

      State:
      - isNewSessionOpen: boolean

      Import and use all components.
    verify: "cd dashboard && npm run build"
    model: sonnet
    max_iterations: 10
    depends_on:
      - implement-session-list
      - implement-session-detail
      - implement-health-indicator
      - implement-new-session-modal
      - implement-websocket-hook

  # ============================================================================
  # PHASE 9: POLISH & TESTING
  # ============================================================================

  - id: add-loading-states
    task: |
      Add proper loading states and skeletons throughout the dashboard.

      Create a simple Skeleton component in dashboard/src/components/Skeleton.tsx:
      - Animated pulse background
      - Configurable height/width
      - Rounded corners

      Add loading states to:
      1. SessionList - skeleton cards while loading
      2. SessionDetail - skeleton content while session loads
      3. LogViewer - "Connecting to logs..." message
      4. HealthIndicator - pulse animation while fetching

      Also add error boundaries or error states:
      - SessionList: "Failed to load sessions. Retry?"
      - SessionDetail: "Failed to load session details"
      - LogViewer: "Log connection failed. Reconnecting..."

      Use Tailwind animate-pulse for loading animations.
    verify: "cd dashboard && npm run build"
    model: haiku
    max_iterations: 8
    depends_on: [implement-app-shell]

  - id: configure-cors-and-proxy
    task: |
      Configure the Vite dev server to proxy API requests to the grind server,
      avoiding CORS issues during development.

      Update dashboard/vite.config.ts:
      ```typescript
      import { defineConfig } from 'vite'
      import react from '@vitejs/plugin-react'

      export default defineConfig({
        plugins: [react()],
        server: {
          port: 3000,
          proxy: {
            '/api': {
              target: 'http://localhost:8420',
              changeOrigin: true,
              rewrite: (path) => path.replace(/^\/api/, ''),
            },
            '/ws': {
              target: 'ws://localhost:8420',
              ws: true,
            },
          },
        },
      })
      ```

      Then update the API client (dashboard/src/api/client.ts) to use '/api' prefix
      instead of hardcoded localhost:8420.

      Update WebSocket hook to use '/ws/events' path.

      This allows:
      - npm run dev on port 3000
      - API calls proxied to :8420
      - WebSocket connections proxied
    verify: "cd dashboard && npm run build"
    model: haiku
    max_iterations: 6
    depends_on: [implement-app-shell]

  - id: add-keyboard-shortcuts
    task: |
      Add keyboard shortcuts for common actions in the dashboard.

      Create dashboard/src/hooks/useKeyboardShortcuts.ts:

      Shortcuts:
      - 'n' - Open new session modal (when not in input)
      - 'Escape' - Close modal or deselect session
      - 'j' / 'ArrowDown' - Select next session in list
      - 'k' / 'ArrowUp' - Select previous session in list
      - 'Enter' - View selected session details
      - 'r' - Refresh sessions list

      Implementation:
      - Use useEffect to add keydown listener
      - Check if event target is input/textarea (ignore shortcuts)
      - Call appropriate store actions
      - Clean up listener on unmount

      Add the hook to App.tsx.

      Optional: Show keyboard shortcut hints in UI (e.g., tooltip on "+ New" button shows "n")
    verify: "cd dashboard && npm run build"
    model: haiku
    max_iterations: 8
    depends_on: [implement-app-shell]

  # ============================================================================
  # PHASE 10: FINAL VERIFICATION
  # ============================================================================

  - id: final-build-verify
    task: |
      Perform final verification of the dashboard build and fix any remaining issues.

      Steps:
      1. Run npm run build in dashboard/ - fix any TypeScript errors
      2. Run npm run lint if available - fix any linting issues
      3. Check for any console.log statements that should be removed
      4. Verify all imports are correct (no circular dependencies)
      5. Test that the dev server starts: npm run dev
      6. Document any known issues or TODOs in dashboard/README.md

      Create a simple dashboard/README.md with:
      - Project description
      - How to run (npm install, npm run dev)
      - How to build (npm run build)
      - API endpoint configuration
      - Known limitations

