---
# Default variables for platform_uv_bootstrap role
# Installs uv binary from Artifactory (no pip dependency)

# Artifactory uv binary repository
platform_uv_bootstrap_artifactory_base_url: "https://internal-ci.example.com/artifactory/uv-remote"

# Installation path
platform_uv_bootstrap_install_path: "/usr/local/bin/uv"

# Temporary download location
platform_uv_bootstrap_download_dir: "/tmp/uv-install"

# Platform-specific binary name (Linux x86_64)
platform_uv_bootstrap_binary_archive: "uv-x86_64-unknown-linux-gnu.tar.gz"

# Directory name inside the tarball
platform_uv_bootstrap_binary_extracted_dir: "uv-x86_64-unknown-linux-gnu"

# PyPI index URL for uv to use (virtual repo includes python-oreilly + pypi)
platform_uv_bootstrap_default_index_url: "https://internal-ci.example.com/artifactory/api/pypi/python-main/simple"

# SHA256 checksums for uv binary verification
# Prevents corrupted binary installations from network failures or compromised downloads
# To get checksum for a new version:
#   1. Download: wget https://github.com/astral-sh/uv/releases/download/0.x.x/uv-x86_64-unknown-linux-gnu.tar.gz
#   2. Calculate: sha256sum uv-x86_64-unknown-linux-gnu.tar.gz
#   3. Add entry: "0.x.x": "sha256:HASH_VALUE"
platform_uv_bootstrap_checksums:
  "0.5.11": "sha256:ACTUAL_HASH_HERE"
