---
# Install uv binary from Artifactory
# No dependency on system pip - downloads pre-built binary

- name: Validate uv_version is defined
  ansible.builtin.assert:
    that:
      - uv_version is defined
      - uv_version | length > 0
    fail_msg: "uv_version must be defined (load platform-dependency-versions.yml first)"
    quiet: true

- name: Check if uv is already installed
  ansible.builtin.stat:
    path: "{{ platform_uv_bootstrap_install_path }}"
  register: platform_uv_bootstrap_binary_stat

- name: Check installed uv version
  ansible.builtin.command: "{{ platform_uv_bootstrap_install_path }} --version"
  register: platform_uv_bootstrap_installed_version
  changed_when: false
  failed_when: false
  when: platform_uv_bootstrap_binary_stat.stat.exists

- name: Parse installed uv version
  ansible.builtin.set_fact:
    platform_uv_bootstrap_current_version: "{{ platform_uv_bootstrap_installed_version.stdout | regex_search('uv ([0-9.]+)', '\\1') | first | default('') }}"
  when:
    - platform_uv_bootstrap_binary_stat.stat.exists
    - platform_uv_bootstrap_installed_version.rc == 0

- name: Determine if uv installation needed
  ansible.builtin.set_fact:
    platform_uv_bootstrap_install_needed: "{{ not platform_uv_bootstrap_binary_stat.stat.exists or
      (platform_uv_bootstrap_current_version | default('')) != uv_version }}"

- name: Display uv version status
  ansible.builtin.debug:
    msg: >-
      uv status: {{ 'not installed' if not platform_uv_bootstrap_binary_stat.stat.exists
      else 'installed v' + (platform_uv_bootstrap_current_version | default('unknown')) }},
      target: v{{ uv_version }},
      action: {{ 'install/upgrade' if platform_uv_bootstrap_install_needed else 'skip (already correct version)' }}

- name: Create temporary download directory
  ansible.builtin.file:
    path: "{{ platform_uv_bootstrap_download_dir }}"
    state: directory
    mode: "0755"
  when: platform_uv_bootstrap_install_needed

- name: Download uv binary from Artifactory
  ansible.builtin.get_url:
    url: "{{ platform_uv_bootstrap_artifactory_base_url }}/{{ uv_version }}/{{ platform_uv_bootstrap_binary_archive }}"
    dest: "{{ platform_uv_bootstrap_download_dir }}/{{ platform_uv_bootstrap_binary_archive }}"
    mode: "0644"
    checksum: "{{ platform_uv_bootstrap_checksums[uv_version] | default(omit) }}"  # sha256 validation from defaults
  when: platform_uv_bootstrap_install_needed

- name: Extract uv binary
  ansible.builtin.unarchive:
    src: "{{ platform_uv_bootstrap_download_dir }}/{{ platform_uv_bootstrap_binary_archive }}"
    dest: "{{ platform_uv_bootstrap_download_dir }}"
    remote_src: true
  when: platform_uv_bootstrap_install_needed

- name: Install uv binary to system path
  ansible.builtin.copy:
    src: "{{ platform_uv_bootstrap_download_dir }}/{{ platform_uv_bootstrap_binary_extracted_dir }}/uv"
    dest: "{{ platform_uv_bootstrap_install_path }}"
    mode: "0755"
    remote_src: true
  when: platform_uv_bootstrap_install_needed

- name: Clean up download directory
  ansible.builtin.file:
    path: "{{ platform_uv_bootstrap_download_dir }}"
    state: absent
  when: platform_uv_bootstrap_install_needed

- name: Verify uv installation
  ansible.builtin.command: "{{ platform_uv_bootstrap_install_path }} --version"
  register: platform_uv_bootstrap_verify
  changed_when: false

- name: Display installed uv version
  ansible.builtin.debug:
    msg: "uv installed: {{ platform_uv_bootstrap_verify.stdout }}"
