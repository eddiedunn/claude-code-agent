# Grind Error Handling Improvements
# Generated: 2026-01-08
# Goal: Stop burning iterations on API errors, add proper error recovery

tasks:
  # ============================================
  # Core Error Detection & Recovery
  # ============================================

  - id: "consecutive-error-detection"
    task: |
      Add consecutive API error detection to grind engine.

      Problem: When API returns errors like "400 tool use concurrency issues",
      grind keeps burning iterations without recovery. Need to detect and stop.

      Requirements in grind/engine.py:
      1. Track consecutive errors using a counter in the iteration loop
      2. Check `result_message.is_error` after each iteration
      3. If is_error is True, increment consecutive_errors counter
      4. If is_error is False, reset counter to 0
      5. If consecutive_errors >= 3, exit loop early with ERROR status
      6. Log when consecutive errors are detected

      Key locations:
      - Main loop: Lines 839-870
      - _process_messages returns ResultMessage with is_error flag
      - _run_iteration needs to return error state info

      Add a new field to track this, don't break existing functionality.
    verify: |
      cd ~/code/claude-code-agent && uv run pytest tests/ -v -k "error" --tb=short 2>&1 | tail -30
    model: sonnet
    max_iterations: 10

  - id: "fast-failure-detection"
    task: |
      Add fast-failure detection to grind engine.

      Problem: When API is in bad state, iterations complete in <1 second
      with errors vs normal iterations taking minutes. This is a signal.

      Requirements in grind/engine.py:
      1. Track iteration duration in the main loop
      2. If iteration completes in < 2 seconds AND has is_error=True, count as fast failure
      3. Track consecutive fast failures
      4. If 3+ consecutive fast failures, exit with ERROR status
      5. Log: "Fast failure detected: iteration completed in {duration}s with error"

      This complements consecutive-error-detection but catches cases where
      the error might not be flagged but the iteration is suspiciously fast.

      Key locations:
      - Main loop already has start_time tracking
      - Add per-iteration timing check after _run_iteration returns
    verify: |
      cd ~/code/claude-code-agent && uv run pytest tests/ -v -k "iteration" --tb=short 2>&1 | tail -30
    model: sonnet
    max_iterations: 8
    depends_on: ["consecutive-error-detection"]

  - id: "exponential-backoff"
    task: |
      Add exponential backoff retry for transient API errors.

      Problem: Transient errors might recover if we wait. Currently no delay.

      Requirements in grind/engine.py:
      1. When is_error detected, wait before next iteration
      2. Backoff schedule: 1s, 2s, 4s (then give up after 3 retries)
      3. Use asyncio.sleep() for the delay
      4. Log: "API error detected, waiting {delay}s before retry ({attempt}/3)"
      5. Reset backoff counter when a successful iteration completes
      6. Only apply backoff when is_error is True, not for normal iterations

      Implementation:
      - Add backoff_delay calculation based on consecutive_errors count
      - Insert sleep before sending continue prompt when in error state
      - Cap at 3 retries with backoff before triggering the consecutive error exit

      This gives transient issues a chance to recover while still failing fast
      on persistent problems.
    verify: |
      cd ~/code/claude-code-agent && uv run pytest tests/ -v --tb=short 2>&1 | tail -30
    model: sonnet
    max_iterations: 8
    depends_on: ["fast-failure-detection"]

  - id: "accurate-error-status"
    task: |
      Return ERROR status instead of MAX_ITERATIONS when iterations fail due to API issues.

      Problem: Tasks that hit API errors report MAX_ITERATIONS which is misleading.
      They should report ERROR with details about what went wrong.

      Requirements in grind/engine.py:
      1. When exiting due to consecutive errors, return GrindStatus.ERROR not MAX_ITERATIONS
      2. When exiting due to fast failures, return GrindStatus.ERROR
      3. Include error details in the result message:
         - "API error: {last_error_message} (failed after {n} consecutive errors)"
         - "Fast failure: iterations completing too quickly with errors"
      4. Update the final result block (lines 862-870) to check if we exited due to errors
      5. Preserve the iteration count in the result for debugging

      This ensures the summary.md and session.log accurately reflect what happened.

      Also update grind/logging.py if needed:
      - log_result() should handle the new error messages appropriately
    verify: |
      cd ~/code/claude-code-agent && uv run pytest tests/ -v --tb=short 2>&1 | tail -30
    model: sonnet
    max_iterations: 8
    depends_on: ["exponential-backoff"]

  # ============================================
  # Testing & Documentation
  # ============================================

  - id: "error-handling-tests"
    task: |
      Add unit tests for the new error handling logic.

      Create tests/test_error_handling.py with tests for:

      1. test_consecutive_error_detection:
         - Mock SDK to return is_error=True multiple times
         - Verify loop exits after 3 consecutive errors
         - Verify status is ERROR not MAX_ITERATIONS

      2. test_fast_failure_detection:
         - Mock iterations that complete in <1 second with errors
         - Verify detection and early exit

      3. test_backoff_timing:
         - Verify backoff delays are applied (1s, 2s, 4s)
         - Mock asyncio.sleep to verify calls

      4. test_error_recovery:
         - Mock: error, error, success
         - Verify counters reset after success
         - Verify task completes normally

      5. test_error_message_accuracy:
         - Verify GrindResult.message contains useful error details

      Use pytest-asyncio for async tests.
      Mock the SDK client to control error responses.
    verify: |
      cd ~/code/claude-code-agent && uv run pytest tests/test_error_handling.py -v --tb=short
    model: sonnet
    max_iterations: 12
    depends_on: ["accurate-error-status"]
