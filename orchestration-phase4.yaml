tasks:
  # PHASE 4: Rebuild TUI on Orchestrator

  # Core Integration

  - id: add_orchestrator_to_executor
    task: "Update grind/tui/core/agent_executor.py to use Orchestrator instead of direct grind() calls - maintain existing AgentExecutor interface"
    verify: "uv run python -c 'from grind.tui.core.agent_executor import AgentExecutor; from grind.orchestration import Orchestrator'"
    max_iterations: 5
    hooks:
      pre_grind: ["/implementation-engineer"]

  - id: event_handler_widget
    task: "Create grind/tui/widgets/event_handler.py - widget that subscribes to EventBus and updates TUI state based on AGENT_STARTED/COMPLETED/FAILED events"
    verify: "uv run python -c 'from grind.tui.widgets.event_handler import EventHandler'"
    max_iterations: 5
    hooks:
      pre_grind: ["/implementation-engineer"]

  - id: integrate_eventbus_tui
    task: "Update grind/tui/app.py to create EventBus, pass to AgentExecutor, and integrate EventHandler widget for real-time updates"
    verify: "uv run python -c 'from grind.tui.app import AgentTUI; app = AgentTUI(); assert hasattr(app, \"event_bus\")'"
    max_iterations: 5
    depends_on: [add_orchestrator_to_executor, event_handler_widget]
    hooks:
      pre_grind: ["/implementation-engineer"]

  # Metrics Display

  - id: metrics_widget
    task: "Create grind/tui/widgets/metrics_view.py - widget displaying agent metrics (success rate, avg duration) from MetricsCollector"
    verify: "uv run python -c 'from grind.tui.widgets.metrics_view import MetricsView'"
    max_iterations: 5
    hooks:
      pre_grind: ["/implementation-engineer"]

  - id: add_metrics_tab
    task: "Add Metrics tab to grind/tui/app.py using MetricsView widget - accessible via key binding '7'"
    verify: "grep -q 'MetricsView' grind/tui/app.py && grep -q '7.*metrics' grind/tui/app.py"
    max_iterations: 5
    depends_on: [metrics_widget, integrate_eventbus_tui]
    hooks:
      pre_grind: ["/implementation-engineer"]

  # Agent Controls

  - id: agent_control_panel
    task: "Create grind/tui/widgets/agent_controls.py - widget with buttons for start/stop/restart individual agents via Orchestrator"
    verify: "uv run python -c 'from grind.tui.widgets.agent_controls import AgentControlPanel'"
    max_iterations: 5
    depends_on: [integrate_eventbus_tui]
    hooks:
      pre_grind: ["/implementation-engineer"]

  - id: integrate_agent_controls
    task: "Add AgentControlPanel to running agents tab in grind/tui/app.py - enable start/stop/restart actions"
    verify: "grep -q 'AgentControlPanel' grind/tui/app.py"
    max_iterations: 5
    depends_on: [agent_control_panel]
    hooks:
      pre_grind: ["/implementation-engineer"]

  # Event-Driven Updates

  - id: update_agent_status_reactive
    task: "Update grind/tui/widgets/agents_manager.py to update agent status reactively from EventBus events instead of polling"
    verify: "uv run pytest tests/test_tui_widgets.py -v -k agent"
    max_iterations: 5
    depends_on: [integrate_eventbus_tui]
    hooks:
      pre_grind: ["/implementation-engineer"]

  - id: add_iteration_events
    task: "Update grind/engine.py to emit ITERATION_STARTED and ITERATION_COMPLETED events via EventBus during grind loop"
    verify: "grep -q 'ITERATION_STARTED\\|ITERATION_COMPLETED' grind/engine.py"
    max_iterations: 5
    hooks:
      pre_grind: ["/implementation-engineer"]

  - id: iteration_progress_display
    task: "Update grind/tui/widgets/agents_manager.py to show iteration progress from ITERATION_* events in real-time"
    verify: "uv run pytest tests/test_tui_widgets.py -v -k iteration"
    max_iterations: 5
    depends_on: [add_iteration_events, update_agent_status_reactive]
    hooks:
      pre_grind: ["/implementation-engineer"]

  # Documentation and Testing

  - id: update_tui_integration_tests
    task: "Update tests/test_tui_integration.py to test Orchestrator integration, EventBus subscription, and metrics display"
    verify: "uv run pytest tests/test_tui_integration.py -v"
    max_iterations: 5
    depends_on: [integrate_agent_controls, iteration_progress_display]
    hooks:
      pre_grind: ["/implementation-engineer"]

  - id: phase4_documentation
    task: "Create docs/architecture/phase4-tui-orchestrator.md documenting TUI-Orchestrator integration with examples and architecture diagrams"
    verify: "test -f docs/architecture/phase4-tui-orchestrator.md && grep -q 'EventBus' docs/architecture/phase4-tui-orchestrator.md"
    max_iterations: 5
    depends_on: [update_tui_integration_tests]
    hooks:
      pre_grind: ["/implementation-engineer"]

  # Validation

  - id: run_all_tests_phase4
    task: "Run full test suite including TUI tests to ensure no regressions from Phase 4 changes"
    verify: "uv run pytest tests/ -v --tb=short"
    max_iterations: 5
    depends_on: [phase4_documentation]
    hooks:
      pre_grind: ["/implementation-engineer"]

  - id: manual_tui_smoke_test
    task: "Create tests/manual/tui_smoke_test.md with step-by-step manual testing guide for TUI-Orchestrator integration"
    verify: "test -f tests/manual/tui_smoke_test.md"
    max_iterations: 5
    depends_on: [run_all_tests_phase4]
    hooks:
      pre_grind: ["/implementation-engineer"]
