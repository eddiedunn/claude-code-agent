tasks:
  # Phase 4 Polish - Complete Remaining Items

  - id: wire_agent_controls
    task: "Add AgentControlPanel widget to Running tab in grind/tui/app.py _compose_running_tab() function - integrate with event callbacks for start/stop/restart"
    verify: "grep -q 'AgentControlPanel' grind/tui/app.py && uv run python -c 'from grind.tui.app import AgentTUI; app = AgentTUI()'"
    max_iterations: 5
    hooks:
      pre_grind: ["/implementation-engineer"]

  - id: connect_event_handler_callback
    task: "Wire EventHandler on_agent_updated callback in grind/tui/app.py on_mount() to update RunningAgentsManager and CompletedAgentsManager"
    verify: "uv run python -c 'from grind.tui.app import AgentTUI; app = AgentTUI()' && grep -q 'on_agent_updated' grind/tui/app.py"
    max_iterations: 5
    depends_on: [wire_agent_controls]
    hooks:
      pre_grind: ["/implementation-engineer"]

  - id: fix_unused_import
    task: "Fix unused import warning for AgentControlPanel in grind/tui/app.py - either use it in compose or remove if not needed after wiring"
    verify: "uv run ruff check grind/tui/app.py --select F401,F841"
    max_iterations: 5
    depends_on: [wire_agent_controls]
    hooks:
      pre_grind: ["/implementation-engineer"]

  - id: update_phase4_status
    task: "Update docs/architecture/phase4-tui-orchestrator.md status to 'Phase 4 Complete (100%)' and document AgentControlPanel integration"
    verify: "grep -q '100%' docs/architecture/phase4-tui-orchestrator.md"
    max_iterations: 5
    depends_on: [wire_agent_controls, connect_event_handler_callback]
    hooks:
      pre_grind: ["/implementation-engineer"]

  - id: run_all_tests
    task: "Run full test suite including TUI tests to verify Phase 4 polish items work correctly"
    verify: "uv run pytest tests/ -v --tb=short"
    max_iterations: 5
    depends_on: [update_phase4_status]
    hooks:
      pre_grind: ["/implementation-engineer"]

  - id: run_tui_smoke_tests
    task: "Update tests/manual/tui_smoke_test.md Test 9 (Metrics Display) to mark as PASS and add note about AgentControlPanel integration in Running tab"
    verify: "grep -q 'AgentControlPanel' tests/manual/tui_smoke_test.md"
    max_iterations: 5
    depends_on: [run_all_tests]
    hooks:
      pre_grind: ["/implementation-engineer"]
